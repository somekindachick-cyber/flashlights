<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手电03表</title>
    <style>
        :root {
            --primary-color: #a78bfa;
            --bg-color: #1e1033;
            --card-bg: #2a1749;
            --text-main: #f0e6ff;
            --text-muted: #c4b5fd;
            --accent-color: #f472b6;
            --border-color: rgba(139, 92, 246, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1e1033 0%, #2d1b69 50%, #3b1f7e 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 24px 16px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h2 {
            font-size: 36px;
            font-weight: 900;
            color: #e9d5ff;
            margin-bottom: 16px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.6);
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
        }

        #search-input {
            width: 100%;
            padding: 14px 24px;
            box-sizing: border-box;
            border: 2px solid var(--border-color);
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-main);
            transition: all 0.2s;
        }

        #search-input::placeholder {
            color: rgba(196, 181, 253, 0.5);
        }

        #search-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.25);
        }

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            background-color: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border-color);
        }

        .card-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(139, 92, 246, 0.08);
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .model {
            font-size: 15px;
            font-weight: 700;
            color: #f5f3ff;
            line-height: 1.3;
        }

        .nickname {
            font-size: 11px;
            color: #1e1033;
            background: linear-gradient(135deg, #c084fc, #e879f9);
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 700;
            white-space: nowrap;
        }

        .price-row {
            margin-top: 8px;
            display: flex;
            gap: 12px;
            font-size: 13px;
        }

        .live-price {
            color: var(--accent-color);
            font-weight: 700;
            font-size: 15px;
        }

        .card-body {
            padding: 14px 16px;
            flex-grow: 1;
        }

        .param-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11.5px;
            line-height: 1.5;
        }

        .param-table td {
            padding: 5px 0;
            border-bottom: 1px dashed rgba(139, 92, 246, 0.15);
            vertical-align: top;
        }

        .param-label {
            color: var(--text-muted);
            width: 38%;
            font-weight: 500;
        }

        .param-val {
            color: var(--text-main);
            width: 62%;
        }

        .card-footer {
            padding: 12px 16px;
            background: rgba(244, 114, 182, 0.08);
            border-top: 1px solid rgba(244, 114, 182, 0.15);
            font-size: 11px;
            color: #f9a8d4;
            line-height: 1.5;
        }

        @media (max-width: 1200px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 560px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h2>🔦 手电03表</h2>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="输入型号、灯珠、昵称实时过滤...">
        </div>
    </header>

    <div class="grid" id="flashlight-grid">
    </div>

    <script>
        let flashlightData = [];

        async function loadData() {
            try {
                const response = await fetch('./data.json');
                if (!response.ok) throw new Error('网络响应不正常');
                flashlightData = await response.json();
                renderCards(flashlightData);
            } catch (error) {
                console.error("加载手电数据失败:", error);
                document.getElementById('flashlight-grid').innerHTML = 
                    `<p style='text-align:center; width:100%; color:#f472b6; grid-column: 1/-1;'>
                        数据加载失败，请检查 data.json 格式是否正确。
                    </p>`;
            }
        }

        function renderCards(data) {
            const grid = document.getElementById('flashlight-grid');
            grid.innerHTML = '';

            if (data.length === 0) {
                grid.innerHTML = "<p style='text-align:center; width:100%; color:#c4b5fd; grid-column: 1/-1;'>没有找到匹配的手电筒</p>";
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img class="card-img" src="${item.image || 'https://via.placeholder.com/400x180/2d1b69/c4b5fd?text=No+Image'}" alt="${item.model}" onerror="this.src='https://via.placeholder.com/400x180/2d1b69/c4b5fd?text=No+Image'">
                    <div class="card-header">
                        <div class="title-row">
                            <span class="model">${item.model}</span>
                            ${item.nickname && item.nickname !== '无' ? `<span class="nickname">${item.nickname}</span>` : ''}
                        </div>
                        <div class="price-row">
                            <div>直播价: <span class="live-price">${item.live_price}</span></div>
                            <div>电池: <span style="color:#34d399; font-weight:700;">${item.battery_price}</span></div>
                        </div>
                    </div>
                    <div class="card-body">
                        <table class="param-table">
                            <tr><td class="param-label">灯珠 / 色温</td><td class="param-val">${item.led} (${item.color_temp})</td></tr>
                            <tr><td class="param-label">亮度 / 射程</td><td class="param-val">${item.max_brightness} / ${item.max_distance}</td></tr>
                            <tr><td class="param-label">电池规格</td><td class="param-val">${item.battery_spec}</td></tr>
                            <tr><td class="param-label">充电 / 功率</td><td class="param-val">${item.charging_method} (${item.charging_power})</td></tr>
                            <tr><td class="param-label">充当充电宝</td><td class="param-val">${item.power_bank}</td></tr>
                            <tr><td class="param-label">续航表现</td><td class="param-val">${item.runtime}</td></tr>
                            <tr><td class="param-label">防护等级</td><td class="param-val">${item.ip_rating}</td></tr>
                            <tr><td class="param-label">尺寸 / 重量</td><td class="param-val">${item.size} / ${item.weight}</td></tr>
                            <tr><td class="param-label">爆闪操作</td><td class="param-val">${item.strobe_op}</td></tr>
                            <tr><td class="param-label">锁定 / 解锁</td><td class="param-val">${item.lock_op}</td></tr>
                            <tr><td class="param-label">配件清单</td><td class="param-val">${item.accessories}</td></tr>
                        </table>
                    </div>
                    ${item.notes ? `<div class="card-footer">⚠️ <strong>注意事项：</strong>${item.notes}</div>` : ''}
                `;
                grid.appendChild(card);
            });
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            const filtered = flashlightData.filter(item => {
                const modelMatch = item.model ? item.model.toLowerCase().includes(keyword) : false;
                const nicknameMatch = item.nickname ? item.nickname.toLowerCase().includes(keyword) : false;
                const ledMatch = item.led ? item.led.toLowerCase().includes(keyword) : false;
                return modelMatch || nicknameMatch || ledMatch;
            });
            renderCards(filtered);
        });

        window.onload = loadData;
    </script>
</body>
</html>
