<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手电筒参数及直播价配置表</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-color: #ef4444;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 24px 16px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h2 {
            font-size: 24px;
            color: #0f172a;
            margin-bottom: 16px;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
        }

        #search-input {
            width: 100%;
            padding: 14px 24px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
        }

        #search-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 4px 12px -1px rgba(37, 99, 235, 0.15);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .card-img {
            width: 100%;
            height: 240px;
            object-fit: contain;
            background-color: #f1f5f9;
            border-bottom: 1px solid var(--border-color);
        }

        .card-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: #f8fafc;
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .model {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
        }

        .nickname {
            font-size: 13px;
            color: var(--primary-color);
            background: #eff6ff;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
            white-space: nowrap;
        }

        .price-row {
            margin-top: 12px;
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .live-price {
            color: var(--accent-color);
            font-weight: 700;
            font-size: 16px;
        }

        .card-body {
            padding: 20px;
            flex-grow: 1;
        }

        .param-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            line-height: 1.5;
        }

        .param-table td {
            padding: 8px 0;
            border-bottom: 1px dashed #f1f5f9;
            vertical-align: top;
        }

        .param-label {
            color: var(--text-muted);
            width: 35%;
            font-weight: 500;
        }

        .param-val {
            color: var(--text-main);
            width: 65%;
        }

        .card-footer {
            padding: 16px 20px;
            background: #fdf2f8;
            border-top: 1px solid #fce7f3;
            font-size: 12px;
            color: #9d174d;
            line-height: 1.6;
        }

        @media (max-width: 420px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h2>🔦 03表</h2>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="输入型号、灯珠、昵称实时过滤...">
        </div>
    </header>

    <div class="grid" id="flashlight-grid">
        <!-- 页面加载时会直接把所有手电平铺渲染在这里 -->
    </div>

    <script>
        let flashlightData = [];

        // 核心：直接获取并平铺渲染
        async function loadData() {
            try {
                const response = await fetch('./data.json');
                if (!response.ok) throw new Error('网络响应不正常');
                flashlightData = await response.json();
                renderCards(flashlightData); // 默认直接渲染全部列表
            } catch (error) {
                console.error("加载手电数据失败:", error);
                document.getElementById('flashlight-grid').innerHTML = 
                    `<p style='text-align:center; width:100%; color:red; grid-column: 1/-1;'>
                        数据加载失败，请检查 data.json 格式是否正确。
                    </p>`;
            }
        }

        // 渲染卡片函数
        function renderCards(data) {
            const grid = document.getElementById('flashlight-grid');
            grid.innerHTML = '';

            if (data.length === 0) {
                grid.innerHTML = "<p style='text-align:center; width:100%; color:#94a3b8; grid-column: 1/-1;'>没有找到匹配的手电筒</p>";
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img class="card-img" src="${item.image || 'https://via.placeholder.com/400x240?text=No+Image'}" alt="${item.model}" onerror="this.src='https://via.placeholder.com/400x240?text=No+Image'">
                    <div class="card-header">
                        <div class="title-row">
                            <span class="model">${item.model}</span>
                            ${item.nickname && item.nickname !== '无' ? `<span class="nickname">${item.nickname}</span>` : ''}
                        </div>
                        <div class="price-row">
                            <div>直播价: <span class="live-price">${item.live_price}</span></div>
                            <div>电池售价: <span style="color:#16a34a; font-weight:700;">${item.battery_price}</span></div>
                        </div>
                    </div>
                    <div class="card-body">
                        <table class="param-table">
                            <tr><td class="param-label">灯珠 / 色温</td><td class="param-val">${item.led} (${item.color_temp})</td></tr>
                            <tr><td class="param-label">亮度 / 射程</td><td class="param-val">${item.max_brightness} / ${item.max_distance}</td></tr>
                            <tr><td class="param-label">电池规格</td><td class="param-val">${item.battery_spec}</td></tr>
                            <tr><td class="param-label">充电 / 功率</td><td class="param-val">${item.charging_method} (${item.charging_power})</td></tr>
                            <tr><td class="param-label">充当充电宝</td><td class="param-val">${item.power_bank}</td></tr>
                            <tr><td class="param-label">续航表现</td><td class="param-val">${item.runtime}</td></tr>
                            <tr><td class="param-label">防护等级</td><td class="param-val">${item.ip_rating}</td></tr>
                            <tr><td class="param-label">尺寸 / 重量</td><td class="param-val">${item.size} / ${item.weight}</td></tr>
                            <tr><td class="param-label">爆闪操作</td><td class="param-val">${item.strobe_op}</td></tr>
                            <tr><td class="param-label">锁定 / 解锁</td><td class="param-val">${item.lock_op}</td></tr>
                            <tr><td class="param-label">配件清单</td><td class="param-val">${item.accessories}</td></tr>
                        </table>
                    </div>
                    ${item.notes ? `<div class="card-footer">⚠️ <strong>注意事项：</strong>${item.notes}</div>` : ''}
                `;
                grid.appendChild(card);
            });
        }

        // 实时过滤功能（输入时在列表中动态隐藏不匹配的）
        // 实时过滤功能（加入了防御机制，防止字段缺失导致报错）
        document.getElementById('search-input').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            const filtered = flashlightData.filter(item => {
                const modelMatch = item.model ? item.model.toLowerCase().includes(keyword) : false;
                const nicknameMatch = item.nickname ? item.nickname.toLowerCase().includes(keyword) : false;
                const ledMatch = item.led ? item.led.toLowerCase().includes(keyword) : false;
                
                return modelMatch || nicknameMatch || ledMatch;
            });
            renderCards(filtered);
        });

        // 页面加载时自动执行
        window.onload = loadData;
    </script>
</body>
</html>
